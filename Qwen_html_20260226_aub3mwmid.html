<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>父母性别计算器</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            background: white;
            width: 90%;
            max-width: 350px;
            padding: 40px 20px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
        }

        h1 {
            font-size: 22px;
            color: #333;
            margin-bottom: 30px;
            position: relative;
            display: inline-block;
        }
        
        h1::after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 50%;
            transform: translateX(-50%);
            width: 40px;
            height: 3px;
            background: #3b5998;
        }

        .options {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
        }

        .option-btn {
            flex: 1;
            padding: 12px;
            border: 1px solid #ddd;
            background: #fff;
            border-radius: 8px;
            font-size: 16px;
            color: #666;
            cursor: pointer;
            transition: all 0.2s;
        }

        .option-btn.active {
            border-color: #3b5998;
            background: #eef2fa;
            color: #3b5998;
            font-weight: bold;
        }

        .start-btn {
            width: 100%;
            padding: 14px;
            background: #3b5998;
            color: white;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(59, 89, 152, 0.3);
        }

        .start-btn:active {
            transform: scale(0.98);
        }

        .progress-area {
            margin-top: 25px;
            display: none;
        }

        .progress-bar-bg {
            width: 100%;
            height: 6px;
            background: #eee;
            border-radius: 3px;
            overflow: hidden;
            margin-bottom: 12px;
        }

        .progress-bar-fill {
            height: 100%;
            width: 0%;
            background: #3b5998;
            transition: width 0.2s linear;
        }

        .loading-text {
            font-size: 13px;
            color: #888;
        }

        .footer {
            margin-top: 20px;
            font-size: 11px;
            color: #ccc;
        }

        /* 弹窗样式 */
        .modal {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 12px;
            text-align: center;
            width: 80%;
            max-width: 300px;
            animation: pop 0.3s ease;
        }

        @keyframes pop {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .result-highlight {
            color: #3b5998;
            font-size: 24px;
            font-weight: bold;
            display: block;
            margin: 10px 0 20px 0;
        }

        .confirm-btn {
            background: #3b5998;
            color: white;
            border: none;
            padding: 8px 30px;
            border-radius: 20px;
            cursor: pointer;
        }
        
        .disclaimer {
            margin-top: 30px;
            font-size: 12px;
            color: #999;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>父母性别计算器</h1>
        
        <div class="options">
            <button class="option-btn active" id="btn-father" onclick="select('father')">父亲</button>
            <button class="option-btn" id="btn-mother" onclick="select('mother')">母亲</button>
        </div>

        <button class="start-btn" id="start-btn" onclick="start()">开始检测</button>

        <div class="progress-area" id="progress-area">
            <div class="progress-bar-bg">
                <div class="progress-bar-fill" id="fill"></div>
            </div>
            <div class="loading-text" id="text">正在解析染色体数据...</div>
        </div>

        <div class="footer">基于先进AI算法 | 准确率99.9%</div>
        
        <div class="disclaimer">纯属整活，切勿当真</div>
    </div>

    <!-- 结果弹窗 -->
    <div class="modal" id="modal" onclick="if(event.target === this) reset()">
        <div class="modal-content">
            <h3>计算成功</h3>
            <p>您的<span id="role-display"></span>性别为：</p>
            <span class="result-highlight" id="result-display"></span>
            <button class="confirm-btn" onclick="reset()">确定</button>
        </div>
    </div>

    <script>
        let role = 'father';
        const texts = ["正在解析染色体数据...", "正在分析基因序列...", "正在验证性别特征...", "计算完成！"];

        function select(r) {
            role = r;
            document.getElementById('btn-father').className = 'option-btn' + (r === 'father' ? ' active' : '');
            document.getElementById('btn-mother').className = 'option-btn' + (r === 'mother' ? ' active' : '');
        }

        function start() {
            document.getElementById('start-btn').style.display = 'none';
            document.getElementById('progress-area').style.display = 'block';
            
            let w = 0;
            let i = 0;
            const interval = setInterval(() => {
                w += 2;
                document.getElementById('fill').style.width = w + '%';
                if (w % 30 === 0 && i < texts.length) {
                    document.getElementById('text').innerText = texts[i++];
                }
                if (w >= 100) {
                    clearInterval(interval);
                    setTimeout(showResult, 500);
                }
            }, 40);
        }

        function showResult() {
            const roleName = role === 'father' ? '父亲' : '母亲';
            // 核心逻辑：反转
            const result = role === 'father' ? '女' : '男';
            
            document.getElementById('role-display').innerText = roleName;
            document.getElementById('result-display').innerText = result + '！';
            document.getElementById('modal').style.display = 'flex';
        }

        function reset() {
            document.getElementById('modal').style.display = 'none';
            document.getElementById('start-btn').style.display = 'block';
            document.getElementById('progress-area').style.display = 'none';
            document.getElementById('fill').style.width = '0%';
            document.getElementById('text').innerText = texts[0];
        }
    </script>
</body>
</html>
