<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - 页面走丢啦</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #fdf6f0;
            color: #5c4b45;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container { text-align: center; max-width: 520px; width: 100%; }
        .cat-svg {
            width: 140px; margin: 0 auto 20px;
            animation: breathe 3s ease-in-out infinite;
        }
        @keyframes breathe {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-6px) scale(1.02); }
        }
        h1 { font-size: 4.2rem; font-weight: 800; color: #e8a598; line-height: 1; margin-bottom: 10px; }
        p { font-size: 1.05rem; line-height: 1.6; color: #7a6b65; margin-bottom: 26px; }
        .actions { display: flex; gap: 14px; justify-content: center; flex-wrap: wrap; }
        .btn {
            display: inline-block; padding: 11px 28px; font-size: 0.95rem;
            text-decoration: none; border-radius: 24px; transition: all 0.2s; font-weight: 500;
        }
        .btn-primary { background: #f4a261; color: #fff; box-shadow: 0 4px 12px rgba(244, 162, 97, 0.35); }
        .btn-primary:hover { background: #e76f51; transform: translateY(-2px); }
        .btn-secondary { background: #fff; color: #7a6b65; border: 2px solid #e8d5cf; }
        .btn-secondary:hover { background: #f9f3f0; border-color: #d4b8b0; }
        @media (max-width: 480px) {
            h1 { font-size: 3.2rem; }
            .actions { flex-direction: column; align-items: center; }
        }
    </style>
</head>
<body>
    <div class="container">
        <svg class="cat-svg" viewBox="0 0 120 110" xmlns="http://www.w3.org/2000/svg">
            <g fill="#f4a261">
                <polygon points="25,35 15,10 45,25"/>
                <polygon points="95,35 105,10 75,25"/>
                <ellipse cx="60" cy="60" rx="40" ry="35"/>
            </g>
            <circle cx="45" cy="55" r="5" fill="#5c4b45"/>
            <circle cx="75" cy="55" r="5" fill="#5c4b45"/>
            <path d="M55 65 Q60 70 65 65" stroke="#5c4b45" stroke-width="2.5" fill="none" stroke-linecap="round"/>
            <g stroke="#5c4b45" stroke-width="2" stroke-linecap="round">
                <line x1="35" y1="60" x2="18" y2="55"/>
                <line x1="35" y1="65" x2="18" y2="65"/>
                <line x1="35" y1="70" x2="18" y2="75"/>
                <line x1="85" y1="60" x2="102" y2="55"/>
                <line x1="85" y1="65" x2="102" y2="65"/>
                <line x1="85" y1="70" x2="102" y2="75"/>
            </g>
        </svg>
        <h1>404</h1>
        <p>喵？这个页面走丢啦～<br>它可能去追毛线球了，或者正躲在纸箱里打盹。</p>
        <div class="actions">
            <a href="/" class="btn btn-primary">返回首页</a>
            <a href="javascript:history.back()" class="btn btn-secondary">返回上一页</a>
        </div>
    </div>
</body>
</html>
